<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cuby Transcribe · 测试页</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { margin-bottom: 4px; }
  .sub { color: #888; margin-bottom: 24px; }
  .card { border: 1px solid #e4e4e7; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  label { display: block; margin: 8px 0 4px; font-weight: 500; }
  input[type=file] { width: 100%; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 180px; }
  button { background: #4f46e5; color: white; border: 0; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 15px; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .bar { background: #eef; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
  .bar > div { background: #4f46e5; height: 100%; transition: width .3s; }
  pre { background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 12px; max-height: 380px; overflow: auto; font-size: 12px; }
  .meta { font-size: 13px; color: #555; }
  .err { color: #c00; }
</style>
</head>
<body>
<h1>🎵 Cuby Transcribe</h1>
<div class="sub">上传一段音频，自动扒成光遇 15 键 CubyScore。</div>

<div class="card">
  <label>API 地址</label>
  <input id="api" value="http://localhost:3000" style="width:100%;padding:6px;" />

  <label style="margin-top:12px;">音频文件 (mp3 / wav / flac)</label>
  <input id="file" type="file" accept="audio/*" />

  <div class="row" style="margin-top:12px;">
    <div>
      <label>转 C 调</label>
      <input id="transpose" type="checkbox" checked />
    </div>
    <div>
      <label>简化旋律</label>
      <input id="simplify" type="checkbox" checked />
    </div>
    <div>
      <label>量化网格</label>
      <select id="grid"><option>16</option><option>8</option></select>
    </div>
  </div>

  <div style="margin-top:16px;">
    <button id="go">开始扒谱</button>
  </div>
</div>

<div class="card" id="progressCard" style="display:none;">
  <div><b>任务：</b><span id="taskId"></span></div>
  <div class="bar"><div id="bar" style="width:0%"></div></div>
  <div class="meta" id="msg">等待中…</div>
</div>

<div class="card" id="resultCard" style="display:none;">
  <div class="meta" id="metaInfo"></div>
  <h3 style="margin-top:12px;">CubyScore</h3>
  <pre id="result"></pre>
  <button id="download">下载 JSON</button>
</div>

<script>
const $ = (id) => document.getElementById(id);
let lastScore = null;

$("go").onclick = async () => {
  const api = $("api").value.replace(/\/$/, "");
  const f = $("file").files[0];
  if (!f) return alert("请选择音频文件");

  const fd = new FormData();
  fd.append("file", f);
  fd.append("options", JSON.stringify({
    transposeToC: $("transpose").checked,
    simplifyMelody: $("simplify").checked,
    quantizeGrid: Number($("grid").value),
  }));

  $("go").disabled = true;
  $("progressCard").style.display = "block";
  $("resultCard").style.display = "none";
  $("msg").textContent = "上传中…";
  $("bar").style.width = "5%";

  try {
    const r = await fetch(api + "/api/transcribe", { method: "POST", body: fd });
    const { taskId, status } = await r.json();
    $("taskId").textContent = taskId;
    $("msg").textContent = status;
    poll(api, taskId);
  } catch (e) {
    $("msg").innerHTML = '<span class="err">' + e.message + '</span>';
    $("go").disabled = false;
  }
};

async function poll(api, taskId) {
  while (true) {
    await new Promise(r => setTimeout(r, 1500));
    const r = await fetch(`${api}/api/transcribe/${taskId}`);
    const data = await r.json();
    $("msg").textContent = `${data.status} — ${data.message || ""}`;
    $("bar").style.width = (data.progress || (data.status === "completed" ? 100 : 30)) + "%";
    if (data.status === "completed") {
      lastScore = data.result;
      const m = data.metadata || {};
      $("metaInfo").innerHTML =
        `调性：<b>${m.detectedKey} ${m.detectedMode}</b> · BPM：<b>${m.bpm}</b> · 时长：${m.duration}s · 音符：${m.noteCount} · 耗时：${m.elapsed}s`;
      $("result").textContent = JSON.stringify(data.result, null, 2);
      $("resultCard").style.display = "block";
      $("go").disabled = false;
      return;
    }
    if (data.status === "failed") {
      $("msg").innerHTML = '<span class="err">失败：' + (data.error || "") + '</span>';
      $("go").disabled = false;
      return;
    }
  }
}

$("download").onclick = () => {
  if (!lastScore) return;
  const blob = new Blob([JSON.stringify(lastScore, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (lastScore.meta?.title || "score") + ".cuby.json";
  a.click();
};
</script>
</body>
</html>
